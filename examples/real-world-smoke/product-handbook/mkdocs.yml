site_name: Product Handbook Alloy Smoke
site_description: Real-world shape fixture for handbook-style docs

theme:
  name: alloy
  palette:
    - scheme: default
      primary: white
      accent: orange
    - scheme: slate
      primary: black
      accent: orange
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - search.highlight

nav:
  - Handbook:
      - index.md
      - Roadmap: roadmap.md
      - Decisions: decisions.md
  - Operations:
      - operations/index.md
      - Runbooks: operations/runbooks.md
