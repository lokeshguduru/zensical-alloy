site_name: SDK Reference Alloy Smoke
site_description: Real-world shape fixture for generated API references
repo_url: https://github.com/lokesh-guduru/zensical-alloy
repo_name: zensical-alloy/sdk-reference

theme:
  name: alloy
  palette:
    - scheme: default
      primary: white
      accent: blue
    - scheme: slate
      primary: black
      accent: blue
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.path
    - navigation.sections
    - search.highlight

nav:
  - SDK:
      - index.md
      - Client: client.md
      - Resources:
          - resources/index.md
          - Projects: resources/projects.md
          - Deployments: resources/deployments.md
