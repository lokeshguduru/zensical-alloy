site_name: Alloy no search no repo
site_description: MkDocs compatibility fixture without search or repository UI

plugins: []

theme:
  name: alloy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: orange
      toggle:
        icon: lucide/sun
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: orange
      toggle:
        icon: lucide/moon
        name: Switch to light mode
  features:
    - navigation.path
    - navigation.sections

nav:
  - Home: index.md
  - Usage: usage.md
  - Guides:
      - guides/index.md
      - Setup: guides/setup.md
      - Tips: guides/tips.md
