site_name: Alloy system fonts
site_description: MkDocs compatibility fixture for custom font stacks

theme:
  name: alloy
  font: false
  palette:
    - scheme: default
      primary: white
      accent: green
    - scheme: slate
      primary: black
      accent: green
  features:
    - content.code.copy
    - navigation.path
    - navigation.sections
    - search.highlight

extra:
  alloy:
    font_sans: "ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font_mono: "ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"

nav:
  - Home: index.md
