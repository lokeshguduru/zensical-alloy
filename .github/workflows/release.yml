name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package and tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[visual]" build

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import tomllib

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          if tag != f"v{version}":
              raise SystemExit(f"Tag {tag} does not match pyproject version {version}")
          PY

      - name: Bundle CSS
        run: python scripts/bundle-css.py

      - name: Check cache-bust version
        run: python scripts/bump-version.py --check

      - name: Run smoke builds
        run: ./scripts/smoke.sh

      - name: Build distribution
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*
          retention-days: 30

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/') || inputs.publish

    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

