name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package and tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[visual]" build

      - name: Bundle CSS
        run: python scripts/bundle-css.py

      - name: Check cache-bust version
        run: python scripts/bump-version.py --check

      - name: Run smoke builds
        run: ./scripts/smoke.sh

      - name: Build distribution
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.run_id }}
          path: dist/*
          retention-days: 14

