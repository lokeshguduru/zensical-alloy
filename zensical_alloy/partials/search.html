{#-
  Override of zensical/templates/partials/search.html.

  Keep Zensical's runtime contract intact: a `data-md-component="search"`
  host with a child button. The search runtime owns the overlay; Alloy only
  changes the trigger's presentation.
-#}
<div class="md-search md-search--alloy" data-md-component="search" role="dialog" aria-label="{{ lang.t('search') }}">
  <button type="button" class="md-search__button md-search__button--alloy" aria-label="{{ lang.t('search') }}" aria-haspopup="dialog">
    <svg class="md-search__icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </svg>
    <span class="md-search__placeholder">{{ lang.t('search') }}</span>
    <kbd class="md-search__kbd" aria-hidden="true">
      <span>⌘</span><span>K</span>
    </kbd>
  </button>
</div>
